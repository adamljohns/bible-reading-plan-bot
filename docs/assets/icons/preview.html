<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Icon Set Preview</title>
<style>
  body { background: #111; font-family: sans-serif; color: #D4AF37; padding: 30px; }
  h1 { color: #D4AF37; margin-bottom: 20px; }
  .grid { display: flex; flex-wrap: wrap; gap: 20px; }
  .icon-card { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 90px; }
  .icon-card img { width: 64px; height: 64px; }
  .icon-card span { font-size: 11px; color: #aaa; text-align: center; }
</style>
</head>
<body>
<h1>usmcmin.org Icon Set — Gold on Black</h1>
<div class="grid">

  <div class='icon-card'><img src='icon-home.svg'><span>home</span></div>
  <div class='icon-card'><img src='icon-target.svg'><span>target</span></div>
  <div class='icon-card'><img src='icon-dove.svg'><span>dove</span></div>
  <div class='icon-card'><img src='icon-handshake.svg'><span>handshake</span></div>
  <div class='icon-card'><img src='icon-fitness.svg'><span>fitness</span></div>
  <div class='icon-card'><img src='icon-shield.svg'><span>shield</span></div>
  <div class='icon-card'><img src='icon-person.svg'><span>person</span></div>

  <div class='icon-card'><img src='icon-gear.svg'><span>gear</span></div>
  <div class='icon-card'><img src='icon-signal.svg'><span>signal</span></div>
  <div class='icon-card'><img src='icon-helmet.svg'><span>helmet</span></div>
  <div class='icon-card'><img src='icon-heart.svg'><span>heart</span></div>

</html>
