<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="10" fill="#000000"/>
  <!-- Envelope -->
  <rect x="8" y="18" width="48" height="32" rx="3" fill="#D4AF37"/>
  <!-- Flap V -->
  <polygon points="8,18 32,36 56,18" fill="#D4AF37" opacity="0.7"/>
  <!-- Flap line -->
  <polyline points="8,18 32,36 56,18" stroke="#000000" stroke-width="2" fill="none"/>
  <!-- Bottom fold lines -->
  <line x1="8" y1="50" x2="22" y2="36" stroke="#000000" stroke-width="1.5"/>
  <line x1="56" y1="50" x2="42" y2="36" stroke="#000000" stroke-width="1.5"/>
</svg>