        function stepBibleUrl(num) {
            if (num.startsWith('H')) return 'https://www.stepbible.org/?q=strong=' + num;
            return 'https://www.blueletterbible.org/lexicon/' + num.toLowerCase() + '/kjv/tr/0-1/';
        }

        function parseRef(ref) {
            const m = ref.trim().match(/^(\d?\s?[a-zA-Z\s]+?)\s*(\d+)(?:\s*:\s*(\d+))?(?:\s*-\s*(\d+))?$/i);
            if (!m) return null;
            const bookName = m[1].trim().toLowerCase();
            const bookId = BOOKS[bookName];
            if (!bookId) return null;
            const ch = parseInt(m[2]);
            const sv = m[3] ? parseInt(m[3]) : 1;
            const ev = m[4] ? parseInt(m[4]) : (m[3] ? sv : 200);
            const fullChapter = !m[3];
            return { bookId, chapter: ch, startVerse: sv, endVerse: ev, isOT: bookId <= 39,
                     display: BOOK_NAMES[bookId].replace(/\b\w/g,c=>c.toUpperCase()), fullChapter };
        }

        async function fetchVerse(bookId, ch, v, trans) {
            try {
                const r = await fetch(`${API}/${trans}/${bookId}/${ch}/${v}/`);
                if (!r.ok) return null;
                const d = await r.json();
                return d.text ? d.text.replace(/<[^>]+>/g,'').replace(/[\u24B6-\u24FF\u2460-\u2473]/g,'').replace(/\s{2,}/g,' ').trim() : null;
            } catch { return null; }
        }

        function similarity(a, b) {
            const wa = new Set(a.toLowerCase().replace(/[^\w\s]/g,'').split(/\s+/));
            const wb = new Set(b.toLowerCase().replace(/[^\w\s]/g,'').split(/\s+/));
            const total = Math.max(wa.size, wb.size);
            if (!total) return 1;
            let overlap = 0;
            wa.forEach(w => { if (wb.has(w)) overlap++; });
            return overlap / total;
        }

        function hasConsecutiveOverlap(text1, text2, minWords) {
            minWords = minWords || 3;
            const words1 = text1.toLowerCase().replace(/[^\w\s]/g,'').split(/\s+/).filter(w => w.length > 0);
            const words2str = text2.toLowerCase().replace(/[^\w\s]/g,'').split(/\s+/).filter(w => w.length > 0).join(' ');
            for (let i = 0; i <= words1.length - minWords; i++) {
                const phrase = words1.slice(i, i + minWords).join(' ');
                if (words2str.includes(phrase)) return true;
            }
            return false;
        }

        function mergeAmplifications(amps) {
            if (amps.length <= 1) return amps;
            const merged = [];
            const used = new Set();
            for (let i = 0; i < amps.length; i++) {
                if (used.has(i)) continue;
                let current = { label: amps[i].label, text: amps[i].text };
                for (let j = i + 1; j < amps.length; j++) {
                    if (used.has(j)) continue;
                    if (hasConsecutiveOverlap(current.text, amps[j].text, 3)) {
                        current.label += ' | ' + amps[j].label;
                        if (amps[j].text.length > current.text.length) current.text = amps[j].text;
                        used.add(j);
                    }
                }
                merged.push(current);
                used.add(i);
            }
            return merged;
        }

        function findArchaic(text) {
            const found = [];
            const lower = text.toLowerCase();
            Object.entries(ARCHAIC).forEach(([word, data]) => {
                if (lower.includes(word)) found.push({ word, origin: data[0], meaning: data[1], strongs: data[2] });
            });
            return found;
        }

        function findStrongs(text, isOT) {
            const keywords = isOT ? STRONGS_OT : STRONGS_NT;
            const lower = text.toLowerCase();
            const found = [];
            const seen = new Set();
            Object.entries(keywords).forEach(([word, num]) => {
                if (lower.includes(word) && !seen.has(num)) {
                    seen.add(num);
                    found.push({ num, def: STRONGS_DEFS[num] || num });
                }
            });
            return found.slice(0, 5);
        }

        const LEFT_SVG = '<svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>';
        const RIGHT_SVG = '<svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>';

        function navChapter(delta) {
            if (!currentRef) return;
            var bookId = currentRef.bookId;
            var newCh = currentRef.chapter + delta;
            var maxCh = BIBLE_INDEX[bookId] ? BIBLE_INDEX[bookId].length : 999;

            if (newCh > maxCh) {
                bookId++;
                if (bookId > 66) return;
                newCh = 1;
            } else if (newCh < 1) {
                bookId--;
                if (bookId < 1) return;
                newCh = BIBLE_INDEX[bookId] ? BIBLE_INDEX[bookId].length : 1;
            }

            viewMode = 'chapter';
            document.getElementById('refInput').value = BOOK_NAMES[bookId].replace(/\b\w/g, c => c.toUpperCase()) + ' ' + newCh;
            lookupVerse();
        }

        function nav3Verses(delta) {
            if (!currentRef) return;
            viewMode = 'verse';
            var bookId = currentRef.bookId;
            var ch = currentRef.chapter;
            var maxV = BIBLE_INDEX[bookId] ? BIBLE_INDEX[bookId][ch - 1] : 200;
            var startV, endV;
            
            if (delta > 0) {
                // Forward: show next 3 verses as a range
                startV = currentRef.endVerse ? currentRef.endVerse + 1 : currentRef.startVerse + 1;
                if (startV > maxV) {
                    ch++;
                    var maxCh = BIBLE_INDEX[bookId] ? BIBLE_INDEX[bookId].length : 999;
                    if (ch > maxCh) {
                        bookId++;
                        if (bookId > 66) return;
                        ch = 1;
                    }
                    maxV = BIBLE_INDEX[bookId] ? BIBLE_INDEX[bookId][ch - 1] : 200;
                    startV = 1;
                }
                endV = Math.min(startV + 2, maxV);
            } else {
                // Backward: show prev 3 verses as a range
                endV = currentRef.startVerse - 1;
                if (endV < 1) {
                    ch--;
                    if (ch < 1) {
                        bookId--;
                        if (bookId < 1) return;
                        ch = BIBLE_INDEX[bookId] ? BIBLE_INDEX[bookId].length : 1;
                    }
                    maxV = BIBLE_INDEX[bookId] ? BIBLE_INDEX[bookId][ch - 1] : 200;
                    endV = maxV;
                }
                startV = Math.max(endV - 2, 1);
            }
            
            var bookName = BOOK_NAMES[bookId].replace(/\b\w/g, c => c.toUpperCase());
            if (startV === endV) {
                document.getElementById('refInput').value = bookName + ' ' + ch + ':' + startV;
            } else {
                document.getElementById('refInput').value = bookName + ' ' + ch + ':' + startV + '-' + endV;
            }
            lookupVerse();
        }

        function goToVerse(ch, v) {
            if (!currentRef) return;
            viewMode = 'verse';
            document.getElementById('refInput').value = currentRef.display + ' ' + ch + ':' + v;
            lookupVerse();
        }

        function navVerse(delta) {
            if (!currentRef) return;
            viewMode = 'verse';
            var bookId = currentRef.bookId;
            var ch = currentRef.chapter;
            var v = currentRef.startVerse + delta;
            var maxV = BIBLE_INDEX[bookId] ? BIBLE_INDEX[bookId][ch - 1] : 200;

            if (v > maxV) {
                ch++;
                var maxCh = BIBLE_INDEX[bookId] ? BIBLE_INDEX[bookId].length : 999;
                if (ch > maxCh) {
                    bookId++;
                    if (bookId > 66) return;
                    ch = 1;
                }
                v = 1;
            } else if (v < 1) {
                ch--;
                if (ch < 1) {
                    bookId--;
                    if (bookId < 1) return;
                    ch = BIBLE_INDEX[bookId] ? BIBLE_INDEX[bookId].length : 1;
                }
                v = BIBLE_INDEX[bookId] ? BIBLE_INDEX[bookId][ch - 1] : 1;
            }

            document.getElementById('refInput').value = BOOK_NAMES[bookId].replace(/\b\w/g, c => c.toUpperCase()) + ' ' + ch + ':' + v;
            lookupVerse();
        }

        function renderNav(rangeStr, position) {
            if (position === 'top') {
                // Top nav: chapter nav (if chapter mode) or verse nav
                if (viewMode === 'chapter') {
                    return '<div class="nav-arrows">' +
                        '<div class="nav-btn-wrap"><button class="nav-arrow" onclick="navChapter(-1)" title="Previous Chapter">' + LEFT_SVG + '</button><span class="nav-label">prev ch</span></div>' +
                        '<span class="nav-ref">' + rangeStr + '</span>' +
                        '<div class="nav-btn-wrap"><button class="nav-arrow" onclick="navChapter(1)" title="Next Chapter">' + RIGHT_SVG + '</button><span class="nav-label">nxt ch</span></div>' +
                        '</div>';
                } else {
                    return '<div class="nav-arrows">' +
                        '<div class="nav-btn-wrap"><button class="nav-arrow" onclick="navVerse(-1)" title="Previous Verse">' + LEFT_SVG + '</button><span class="nav-label">prev vs</span></div>' +
                        '<span class="nav-ref">' + rangeStr + '</span>' +
                        '<div class="nav-btn-wrap"><button class="nav-arrow" onclick="navVerse(1)" title="Next Verse">' + RIGHT_SVG + '</button><span class="nav-label">nxt vs</span></div>' +
                        '</div>';
                }
            } else {
                // Bottom nav: verse nav (if chapter) or 3-verse nav
                if (viewMode === 'chapter') {
                    return '<div class="nav-arrows">' +
                        '<div class="nav-btn-wrap"><button class="nav-arrow" onclick="navVerse(-1)" title="Previous Verse">' + LEFT_SVG + '</button><span class="nav-label">prev vs</span></div>' +
                        '<span class="nav-ref">' + rangeStr + '</span>' +
                        '<div class="nav-btn-wrap"><button class="nav-arrow" onclick="navVerse(1)" title="Next Verse">' + RIGHT_SVG + '</button><span class="nav-label">nxt vs</span></div>' +
                        '</div>';
                } else {
                    return '<div class="nav-arrows">' +
                        '<div class="nav-btn-wrap"><button class="nav-arrow" onclick="nav3Verses(-1)" title="Back 3 Verses">' + LEFT_SVG + '</button><span class="nav-label">prev 3vs</span></div>' +
                        '<span class="nav-ref">' + rangeStr + '</span>' +
                        '<div class="nav-btn-wrap"><button class="nav-arrow" onclick="nav3Verses(1)" title="Forward 3 Verses">' + RIGHT_SVG + '</button><span class="nav-label">nxt 3vs</span></div>' +
                        '</div>';
                }
            }
        }

        async function lookupVerse() {
            const input = document.getElementById('refInput').value.trim();
            if (!input) return;
            const ref = parseRef(input);
            if (!ref) { document.getElementById('results').innerHTML = '<div class="error">Could not parse that reference. Try "John 3:16" or "Romans 8:28-30".</div>'; return; }
            currentRef = ref;
            isFullChapter = ref.fullChapter;
            if (isFullChapter && viewMode !== 'verse') viewMode = 'chapter';
            else if (!isFullChapter) viewMode = 'verse';
            document.getElementById('searchBtn').disabled = true;
            document.getElementById('results').innerHTML = '<div class="loading">📖 Fetching from 9 translations...</div>';

            const allVerses = [];
            const allStrongs = [];
            const allClarity = [];
            const seenStrongs = new Set();
            const seenClarity = new Set();
            const transAgreements = {};
            const transFetched = {};
            TRANSLATIONS.forEach(t => { if (t !== 'NKJV') { transAgreements[t] = 0; transFetched[t] = 0; } });

            for (let v = ref.startVerse; v <= ref.endVerse; v++) {
                const results = await Promise.all(TRANSLATIONS.map(t => fetchVerse(ref.bookId, ref.chapter, v, t)));
                const texts = {};
                TRANSLATIONS.forEach((t, i) => { if (results[i]) texts[t] = results[i]; });
                if (!texts.NKJV) break;
                TRANSLATIONS.forEach(t => { if (t !== 'NKJV' && texts[t]) transFetched[t]++; });

                const amps = [];
                const ampTranslations = new Set();
                AMP_PRIORITY.forEach(t => {
                    if (!texts[t]) return;
                    if (similarity(texts.NKJV, texts[t]) < 0.65) {
                        amps.push({ label: DISPLAY[t] || t, text: texts[t] });
                        ampTranslations.add(t);
                    }
                });
                if (texts.AMP && texts.AMP.includes('[') && !amps.find(a => a.label === 'AMP')) {
                    amps.push({ label: 'AMP', text: texts.AMP });
                    ampTranslations.add('AMP');
                }
                TRANSLATIONS.forEach(t => {
                    if (t !== 'NKJV' && texts[t] && !ampTranslations.has(t)) transAgreements[t]++;
                });

                const mergedAmps = mergeAmplifications(amps);
                const st = findStrongs(texts.NKJV, ref.isOT);
                st.forEach(s => { if (!seenStrongs.has(s.num)) { s.vref = v; allStrongs.push(s); seenStrongs.add(s.num); } });
                const cl = findArchaic(texts.NKJV);
                cl.forEach(c => { if (!seenClarity.has(c.word)) { allClarity.push(c); seenClarity.add(c.word); } });
                allVerses.push({ num: v, text: texts.NKJV, amps: mergedAmps.slice(0, 2) });
            }

            if (!allVerses.length) {
                document.getElementById('results').innerHTML = '<div class="error">No verses found. Check the reference.</div>';
                document.getElementById('searchBtn').disabled = false;
                return;
            }

            const lastVerse = allVerses[allVerses.length - 1].num;
            currentRef.endVerse = lastVerse;

            let secondaryTrans = 'ESV';
            let bestScore = -1;
            Object.entries(transAgreements).forEach(([t, count]) => {
                const weight = WEIGHTS[t] || 0;
                const score = count * 10 + weight * 100;
                if (score > bestScore && transFetched[t] > 0) { bestScore = score; secondaryTrans = DISPLAY[t] || t; }
            });
            const transIndicator = ' <span class="trans-indicator">(NKJV|' + secondaryTrans + ')</span>';

            const maxStrongs = Math.min(5, Math.max(2, allStrongs.length));
            const maxClarity = Math.min(2, allClarity.length);
            const limitedStrongs = allStrongs.slice(0, maxStrongs);
            const limitedClarity = allClarity.slice(0, maxClarity);

            const rangeStr = allVerses.length === 1
                ? ref.display + ' ' + ref.chapter + ':' + ref.startVerse
                : ref.display + ' ' + ref.chapter + ':' + ref.startVerse + '-' + lastVerse;

            let html = renderNav(rangeStr, 'top');
            html += '<div class="result-card"><div class="result-header">' + rangeStr + transIndicator + '</div>';

            allVerses.forEach(v => {
                html += '<div class="verse-block"><span class="verse-num clickable" onclick="goToVerse(' + ref.chapter + ',' + v.num + ')" title="View verse ' + v.num + ' in detail">' + v.num + '</span> <span class="verse-text">' + v.text + '</span>';
                v.amps.forEach(a => {
                    html += '<div class="amplification"><span class="amp-label">' + a.label + ':</span> ' + a.text + '</div>';
                });
                html += '</div>';
            });

            if (limitedStrongs.length) {
                const testament = ref.isOT ? 'Hebrew' : 'Greek';
                html += '<div class="strongs-section"><h4>📖 Interlinear ' + testament + ' Roots</h4>';
                limitedStrongs.forEach(s => {
                    const vr = s.vref ? ' <span style="color:#666;font-size:0.75rem;">(v.' + s.vref + ')</span>' : '';
                    const url = stepBibleUrl(s.num);
                    html += '<span class="strongs-entry"><span class="strongs-def">' + s.def + '</span> ' +
                        '<a class="strongs-link" href="' + url + '" target="_blank" title="View full word study">(' + s.num + ')</a>' + vr + '</span>';
                });
                html += '</div>';
            }

            if (limitedClarity.length) {
                html += '<div class="clarity-section"><h4>💡 Clarity Notes</h4>';
                limitedClarity.forEach(c => {
                    const link = c.strongs ? ' <a class="clarity-link" href="' + stepBibleUrl(c.strongs) + '" target="_blank">' + c.strongs + '</a>' : '';
                    html += '<div class="clarity-note"><span class="clarity-word">"' + c.word + '"</span> → ' + c.origin + ': ' + c.meaning + link + '</div>';
                });
                html += '</div>';
            }

            if (ref.isOT) {
                html += '<div class="lexicon-footer">Word studies: <a href="https://www.stepbible.org/?q=version=THOT" target="_blank">STEP Bible</a> (Tyndale House, Cambridge)</div>';
            } else {
                html += '<div class="lexicon-footer">Word studies: <a href="https://www.blueletterbible.org/" target="_blank">Blue Letter Bible</a></div>';
            }
            html += '<div class="engine-info">The MOOP Bible Translation Engine V3.2 · 9 translations · Interlinear ' + (ref.isOT ? 'Hebrew' : 'Greek') + ' backbone</div>';
            html += '</div>';
            html += renderNav(rangeStr, 'bottom');

            document.getElementById('results').innerHTML = html;
            document.getElementById('searchBtn').disabled = false;
            document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        document.getElementById('refInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') lookupVerse();
        });

        // Auto-load on page load
        window.addEventListener('DOMContentLoaded', () => lookupVerse());
    </script>
